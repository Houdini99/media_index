<nav>
  <a class="brand" href="{{ url_for('media.index') }}">
    <span class="brand-mark">M</span>
    <span class="brand-name">MediaIndex</span>
  </a>
  <div class="nav-sep"></div>
  <div class="nav-links">
    <a href="{{ url_for('media.index') }}"  class="{{ 'active' if request.path == '/' else '' }}">Gallery</a>
    <a href="{{ url_for('media.feed') }}"   class="{{ 'active' if request.path.startswith('/feed') else '' }}">Feed</a>
    <a href="{{ url_for('media.upload') }}" class="{{ 'active' if request.path.startswith('/upload') else '' }}">Upload</a>
    <a href="{{ url_for('media.tags') }}"   class="{{ 'active' if request.path.startswith('/tags') else '' }}">Tags</a>
  </div>
  <div class="nav-right">
    {% if g.user %}
      <div class="user-chip">
        <div class="user-avatar">{{ g.user.username[0].upper() }}</div>
        {{ g.user.username }}
      </div>
      <form method="post" action="{{ url_for('auth.logout') }}" style="display:inline;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <button type="submit" class="nav-logout" style="background:none;cursor:pointer;font-family:inherit;">Sign Out</button>
      </form>
    {% else %}
      <a class="btn btn-primary" href="{{ url_for('auth.login') }}" style="font-size:.8rem;padding:.3rem .75rem;">Sign In</a>
    {% endif %}
  </div>
</nav>
