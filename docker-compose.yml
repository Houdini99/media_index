version: '3.8'

services:
  web:
    build: .
    container_name: mediaindex-web
    restart: unless-stopped
    ports:
      - "${PORT:-5001}:5001"
    volumes:
      - ./media_files:/app/media_files
      - ./thumbnails:/app/thumbnails
      - ./log:/app/log
      - ./media_index.db:/app/media_index.db
      - ./users.db:/app/users.db
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DEV_MODE=${DEV_MODE:-false}
      - PORT=${PORT:-5001}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: mediaindex-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
